version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    target-branch: dev
    open-pull-requests-limit: 0

  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    target-branch: dev
    open-pull-requests-limit: 0

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    target-branch: dev
    open-pull-requests-limit: 0
